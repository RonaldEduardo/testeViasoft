<div class="bg-white w-[30rem] h-full shadow-lg p-6 flex flex-col">
  <div class="flex justify-between mb-4 items-center">
    <h2 class="text-lg font-bold">Seu Carrinho</h2>
    <button
      class="text-sm text-gray-600 hover:text-gray-900"
      (click)="onClose()"
    >
      Fechar
    </button>
  </div>

  <div
    class="flex-1 overflow-y-auto pr-1"
    *ngIf="items$ | async as productsInCart"
  >
    <div
      *ngFor="let p of productsInCart"
      class="border border-gray-200 rounded-md p-3 mb-3"
    >
      <div class="font-medium text-gray-900">{{ p.product.name }}</div>
      <div class="text-sm text-gray-600">{{ p.product.category }}</div>
      <div class="text-sm text-gray-700 mt-1">
        Unit.: {{ p.product.price | currency: "BRL" : "symbol" : "1.2-2" }}
      </div>

      <div class="flex items-center justify-between mt-3">
        <div class="flex items-center gap-2">
          <button
            class="h-7 w-7 rounded border border-gray-300"
            (click)="decreaseQuantity(p)"
          >
            -
          </button>
          <span class="min-w-[2rem] text-center">{{ p.quantity }}</span>
          <button
            class="h-7 w-7 rounded border border-gray-300"
            (click)="increaseQuantity(p)"
          >
            +
          </button>
        </div>

        <div class="text-sm font-semibold text-gray-900">
          {{ p.total | currency: "BRL" : "symbol" : "1.2-2" }}
        </div>
      </div>

      <div class="mt-2">
        <button
          class="text-xs text-red-600 hover:text-red-800"
          (click)="removeItem(p)"
        >
          Remover
        </button>
      </div>
    </div>

    <p *ngIf="productsInCart.length === 0" class="text-sm text-gray-500 mt-4">
      Seu carrinho esta vazio.
    </p>
  </div>

  <div class="border-t border-gray-200 pt-4 mt-4">
    <div class="flex items-center justify-between mb-3">
      <span class="text-sm text-gray-600">Total</span>
      <span class="text-base font-bold text-gray-900">
        {{ (total$ | async) || 0 | currency: "BRL" : "symbol" : "1.2-2" }}
      </span>
    </div>

    <button
      class="w-full bg-blue-600 text-white py-2 rounded-md disabled:bg-gray-300"
      [disabled]="((items$ | async)?.length || 0) === 0"
      (click)="onCheckout()"
    >
      Finalizar compra
    </button>
  </div>
</div>
