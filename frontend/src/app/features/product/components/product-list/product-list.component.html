<div class="overflow-x-auto p-4 bg-brand-alabaster">

  <div class="flex items-center justify-between mb-4">
    <h2 class="text-2xl font-semibold text-brand-ink">Listagem de produtos</h2>
  </div>
  <div
    class="mb-6 bg-brand-cream p-4 rounded-lg shadow-sm border border-brand-cream"
  >
    <label
      for="searchName"
      class="block text-sm font-medium text-brand-charcoal mb-1"
      >Buscar por Nome</label
    >

    <input
      type="text"
      id="searchName"
      name="searchName"
      [(ngModel)]="filtroNome"
      placeholder="Digite para filtrar..."
      class="w-full px-3 py-2 border border-brand-sage rounded-md bg-brand-alabaster focus:outline-none focus:ring-2 focus:ring-brand-mint"
    />
  </div>
  <div
    class="mb-6 bg-brand-cream p-4 rounded-lg shadow-sm border border-brand-cream"
  >
    <label
      for="searchCategory"
      class="block text-sm font-medium text-brand-charcoal mb-1"
      >Buscar por Categoria</label
    >

    <select
      id="searchCategory"
      name="searchCategory"
      [(ngModel)]="filtroCategoria"
      class="w-full px-3 py-2 border border-brand-sage rounded-md bg-brand-alabaster focus:outline-none focus:ring-2 focus:ring-brand-mint cursor-pointer"
    >
      <option value="">Todas as Categorias</option>

      <option *ngFor="let product of products" [value]="product.category">
        {{ product.category }}
      </option>
    </select>
  </div>

  <div
    class="mb-6 bg-brand-cream p-4 rounded-lg shadow-sm border border-brand-cream"
  >
    <button
      class="inline-flex items-center gap-2 text-brand-charcoal hover:text-brand-ink font-medium"
      (click)="limparFiltros()"
      aria-label="Limpar filtro"
    >
      <ng-icon name="refresh" class="h-4 w-4"></ng-icon>
      <span>Limpar Filtro</span>
    </button>
  </div>

  <table
    class="min-w-full bg-brand-cream border border-brand-cream shadow-md rounded-lg"
  >
    <thead class="bg-brand-sage text-brand-ink">
      <tr>
        <th class="py-3 px-4 border-b text-left font-semibold">Nome</th>
        <th class="py-3 px-4 border-b text-left font-semibold">Categoria</th>
        <th class="py-3 px-4 border-b text-left font-semibold">Preço</th>
        <th class="py-3 px-4 border-b text-center font-semibold">Ações</th>
      </tr>
    </thead>

    <tbody>
      <tr
        *ngFor="let product of produtosFiltrados"
        class="hover:bg-brand-mint transition-colors duration-200"
      >
        <td class="py-3 px-4 border-b text-brand-ink">{{ product.name }}</td>
        <td class="py-3 px-4 border-b text-brand-charcoal">
          {{ product.category }}
        </td>
        <td class="py-3 px-4 border-b text-brand-ink">
          {{ product.price | currency: "BRL" : "symbol" : "1.2-2" }}
        </td>
        <td class="py-3 px-4 border-b text-center">
          <button
            [routerLink]="['/products/edit', product.id]"
            class="inline-flex items-center gap-2 text-brand-charcoal hover:text-brand-ink font-medium"
          >
            <ng-icon name="edit" class="h-4 w-4"></ng-icon>
            <span>Visualizar / Editar</span>
          </button>
        </td>
        <td class="py-3 px-4 border-b text-center">
          <button
            (click)="addToCart(product)"
            class="inline-flex items-center gap-2 text-brand-charcoal hover:text-brand-ink font-medium"
          >
            <ng-icon name="cart" class="h-4 w-4"></ng-icon>
            <span>Adicionar ao Carrinho</span>
          </button>
        </td>
      </tr>

      <tr *ngIf="products.length === 0">
        <td colspan="4" class="py-4 text-center text-brand-charcoal">
          Nenhum produto encontrado.
        </td>
      </tr>
    </tbody>
  </table>
</div>
