<div class="overflow-x-auto p-4">
  <div class="mb-6 bg-white p-4 rounded-lg shadow-sm border border-gray-200">
    <label for="searchName" class="block text-sm font-medium text-gray-700 mb-1"
      >Buscar por Nome</label
    >

    <input
      type="text"
      id="searchName"
      name="searchName"
      [(ngModel)]="filtroNome"
      placeholder="Digite para filtrar..."
      class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
    />
  </div>
  <div class="mb-6 bg-white p-4 rounded-lg shadow-sm border border-gray-200">
    <label
      for="searchCategory"
      class="block text-sm font-medium text-gray-700 mb-1"
      >Buscar por Categoria</label
    >

    <select
      id="searchCategory"
      name="searchCategory"
      [(ngModel)]="filtroCategoria"
      class="w-full px-3 py-2 border border-gray-300 rounded-md bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer"
    >
      <option value="">Todas as Categorias</option>

      <option *ngFor="let product of products" [value]="product.category">
        {{ product.category }}
      </option>
    </select>
  </div>

  <div class="mb-6 bg-white p-4 rounded-lg shadow-sm border border-gray-200">
    <button
      class="text-blue-600 hover:text-blue-800 font-medium"
      (click)="limparFiltros()"
    >
      Limpar Filtro
    </button>
  </div>

  <table
    class="min-w-full bg-white border border-gray-200 shadow-md rounded-lg"
  >
    <thead class="bg-gray-100 text-gray-700">
      <tr>
        <th class="py-3 px-4 border-b text-left font-semibold">Nome</th>
        <th class="py-3 px-4 border-b text-left font-semibold">Categoria</th>
        <th class="py-3 px-4 border-b text-left font-semibold">Preço</th>
        <th class="py-3 px-4 border-b text-center font-semibold">Ações</th>
      </tr>
    </thead>

    <tbody>
      <tr
        *ngFor="let product of produtosFiltrados"
        class="hover:bg-gray-50 transition-colors duration-200"
      >
        <td class="py-3 px-4 border-b text-gray-800">{{ product.name }}</td>
        <td class="py-3 px-4 border-b text-gray-600">{{ product.category }}</td>
        <td class="py-3 px-4 border-b text-gray-800">
          {{ product.price | currency: "BRL" : "symbol" : "1.2-2" }}
        </td>
        <td class="py-3 px-4 border-b text-center">
          <button
            [routerLink]="['/products/edit', product.id]"
            class="text-blue-600 hover:text-blue-800 font-medium"
          >
            Visualizar / Editar
          </button>
        </td>
        <td class="py-3 px-4 border-b text-center">
          <button
            (click)="addToCart(product)"
            class="text-blue-600 hover:text-blue-800 font-medium"
          >
            Adicionar ao Carrinho
          </button>
        </td>
      </tr>

      <tr *ngIf="products.length === 0">
        <td colspan="4" class="py-4 text-center text-gray-500">
          Nenhum produto encontrado.
        </td>
      </tr>
    </tbody>
  </table>
</div>
