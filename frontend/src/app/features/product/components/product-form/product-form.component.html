<div class="p-6 max-w-lg mx-auto bg-brand-cream rounded-xl shadow-md space-y-4">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-2xl font-semibold text-brand-ink">{{ isEditMode ? "Editar Produto" : "Novo Produto" }}</h2>
    <a routerLink="/products" class="text-sm text-brand-charcoal hover:text-brand-ink inline-flex items-center gap-2">
      <ng-icon name="back" class="h-4 w-4"></ng-icon>
      <span>Voltar para produtos</span>
    </a>
  </div>

  <form [formGroup]="productForm" (ngSubmit)="onSubmit()" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-brand-charcoal">Nome</label>
      <input
        type="text"
        formControlName="name"
        class="mt-1 block w-full rounded-md border border-brand-sage bg-brand-alabaster shadow-sm focus:border-brand-mint focus:ring-brand-mint"
      />
      <span
        *ngIf="
          productForm.get('name')?.invalid && productForm.get('name')?.touched
        "
        class="text-xs text-brand-ink"
      >
        Nome é obrigatório (mínimo 3 caracteres).
      </span>
    </div>

    <div>
      <label class="block text-sm font-medium text-brand-charcoal"
        >Categoria</label
      >
      <select
        id="category"
        name="category"
        formControlName="category"
        class="w-full px-3 py-2 border border-brand-sage rounded-md bg-brand-alabaster focus:outline-none focus:ring-2 focus:ring-brand-mint cursor-pointer"
      >
        <option [ngValue]="null">Selecione uma categoria</option>
        <option *ngFor="let cat of optionsCategory" [ngValue]="cat.value">
          {{ cat.label }}
        </option>
      </select>
    </div>

    <div *ngIf="recipeProductField">
      <label class="block text-sm font-medium text-brand-charcoal"
        >Recipe</label
      >
      <input
        type="text"
        formControlName="recipeProduct"
        placeholder="Informe a recipe do defensivo"
        class="mt-1 block w-full rounded-md border border-brand-sage bg-brand-alabaster shadow-sm focus:border-brand-mint focus:ring-brand-mint"
      />
      <span
        *ngIf="
          productForm.get('recipeProduct')?.invalid &&
          productForm.get('recipeProduct')?.touched
        "
        class="text-xs text-brand-ink"
      >
        Recipe é obrigatória para categoria Defensivo.
      </span>
    </div>

    <div>
      <label class="block text-sm font-medium text-brand-charcoal">Preço</label>
      <input
        type="number"
        formControlName="price"
        class="mt-1 block w-full rounded-md border border-brand-sage bg-brand-alabaster shadow-sm focus:border-brand-mint focus:ring-brand-mint"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-brand-charcoal"
        >Quantidade em estoque</label
      >
      <input
        type="number"
        formControlName="stockQuantity"
        class="mt-1 block w-full rounded-md border border-brand-sage bg-brand-alabaster shadow-sm focus:border-brand-mint focus:ring-brand-mint"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-brand-charcoal">Safra</label>
      <select
        id="safra"
        name="safra"
        formControlName="safra"
        class="w-full px-3 py-2 border border-brand-sage rounded-md bg-brand-alabaster focus:outline-none focus:ring-2 focus:ring-brand-mint cursor-pointer"
      >
        <option *ngFor="let safra of optionsSafra" [ngValue]="safra.value">
          {{ safra.label }}
        </option>
      </select>
    </div>

    <h2 class="text-lg font-semibold text-brand-ink">
      {{ isEditMode ? "Editar Produto" : "Novo Produto" }}
    </h2>
    <button
      type="submit"
      class="w-full bg-brand-sage text-brand-ink py-2 rounded-md hover:bg-brand-mint"
    >
      {{ isEditMode ? "Atualizar" : "Salvar" }}
    </button>
  </form>
</div>
