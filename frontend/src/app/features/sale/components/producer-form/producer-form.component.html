<div class="p-6 max-w-lg mx-auto bg-brand-cream rounded-xl shadow-md space-y-4">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-2xl font-semibold text-brand-ink">
      {{ isEditMode ? "Editar Produtor" : "Novo Produtor" }}
    </h2>
    <a
      routerLink="/checkout"
      class="text-sm text-brand-charcoal hover:text-brand-ink inline-flex items-center gap-2"
    >
      <ng-icon name="back" class="h-4 w-4"></ng-icon>
      <span>Voltar para finalizar</span>
    </a>
  </div>

  <div
    *ngIf="notFound"
    class="rounded-md border border-brand-sage bg-brand-alabaster p-3 text-sm text-brand-ink"
  >
    Produtor nao foi encontrado.
  </div>

  <form [formGroup]="producerForm" (ngSubmit)="onSubmit()" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-brand-charcoal">Nome</label>
      <input
        type="text"
        formControlName="name"
        class="mt-1 block w-full rounded-md border border-brand-sage bg-brand-alabaster shadow-sm focus:border-brand-mint focus:ring-brand-mint"
      />
      <span
        *ngIf="producerForm.get('name')?.invalid && producerForm.get('name')?.touched"
        class="text-xs text-brand-ink"
      >
        Nome e obrigatorio (minimo 3 e maximo 100 caracteres).
      </span>
    </div>

    <div>
      <label class="block text-sm font-medium text-brand-charcoal">
        Limite de credito
      </label>
      <input
        type="number"
        formControlName="creditLimit"
        class="mt-1 block w-full rounded-md border border-brand-sage bg-brand-alabaster shadow-sm focus:border-brand-mint focus:ring-brand-mint"
      />
      <span
        *ngIf="
          producerForm.get('creditLimit')?.invalid &&
          producerForm.get('creditLimit')?.touched
        "
        class="text-xs text-brand-ink"
      >
        O limite de credito deve ser maior que zero.
      </span>
    </div>

    <div>
      <label class="block text-sm font-medium text-brand-charcoal">CNPJ</label>
      <input
        type="text"
        formControlName="cnpj"
        appCnpjMask
        maxlength="18"
        [disabled]="isEditMode"
        class="mt-1 block w-full rounded-md border border-brand-sage bg-brand-alabaster shadow-sm focus:border-brand-mint focus:ring-brand-mint"
      />
      <span
        *ngIf="producerForm.get('cnpj')?.invalid && producerForm.get('cnpj')?.touched"
        class="text-xs text-brand-ink"
      >
        CNPJ deve ter entre 3 e 14 digitos.
      </span>
    </div>

    <h2 class="text-lg font-semibold text-brand-ink">
      {{ isEditMode ? "Editar Produtor" : "Novo Produtor" }}
    </h2>
    <button
      type="submit"
      class="w-full bg-brand-sage text-brand-ink py-2 rounded-md hover:bg-brand-mint"
    >
      {{ isEditMode ? "Atualizar" : "Salvar" }}
    </button>
  </form>
</div>
