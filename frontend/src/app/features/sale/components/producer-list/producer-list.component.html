<div class="overflow-x-auto p-4 bg-brand-alabaster">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-2xl font-semibold text-brand-ink">
      Listagem de produtores
    </h2>
  </div>

  <div
    class="mb-6 bg-brand-cream p-4 rounded-lg shadow-sm border border-brand-cream"
  >
    <label
      for="searchProducerName"
      class="block text-sm font-medium text-brand-charcoal mb-1"
      >Buscar por Nome</label
    >

    <input
      type="text"
      id="searchProducerName"
      name="searchProducerName"
      [(ngModel)]="filtroNome"
      placeholder="Digite para filtrar..."
      class="w-full px-3 py-2 border border-brand-sage rounded-md bg-brand-alabaster focus:outline-none focus:ring-2 focus:ring-brand-mint"
    />
  </div>

  <div
    class="mb-6 bg-brand-cream p-4 rounded-lg shadow-sm border border-brand-cream"
  >
    <label
      for="searchProducerCnpj"
      class="block text-sm font-medium text-brand-charcoal mb-1"
      >Buscar por CNPJ</label
    >

    <input
      type="text"
      id="searchProducerCnpj"
      name="searchProducerCnpj"
      [(ngModel)]="filtroCnpj"
      placeholder="Digite para filtrar..."
      class="w-full px-3 py-2 border border-brand-sage rounded-md bg-brand-alabaster focus:outline-none focus:ring-2 focus:ring-brand-mint"
    />
  </div>

  <div
    class="mb-6 bg-brand-cream p-4 rounded-lg shadow-sm border border-brand-cream"
  >
    <button
      class="inline-flex items-center gap-2 text-brand-charcoal hover:text-brand-ink font-medium"
      (click)="limparFiltros()"
      aria-label="Limpar filtro"
    >
      <ng-icon name="refresh" class="h-4 w-4"></ng-icon>
      <span>Limpar Filtro</span>
    </button>
  </div>

  <table
    class="min-w-full bg-brand-cream border border-brand-cream shadow-md rounded-lg"
  >
    <thead class="bg-brand-sage text-brand-ink">
      <tr>
        <th class="py-3 px-4 border-b text-left font-semibold">Nome</th>
        <th class="py-3 px-4 border-b text-left font-semibold">CNPJ</th>
        <th class="py-3 px-4 border-b text-left font-semibold">
          Limite de credito
        </th>
        <th class="py-3 px-4 border-b text-center font-semibold">Acoes</th>
      </tr>
    </thead>

    <tbody>
      <tr
        *ngFor="let producer of produtoresFiltrados"
        class="hover:bg-brand-mint transition-colors duration-200"
      >
        <td class="py-3 px-4 border-b text-brand-ink">
          {{ producer.name }}
        </td>
        <td class="py-3 px-4 border-b text-brand-charcoal">
          {{ producer.cnpj }}
        </td>
        <td class="py-3 px-4 border-b text-brand-ink">
          {{ producer.creditLimit | currency: "BRL" : "symbol" : "1.2-2" }}
        </td>
        <td class="py-3 px-4 border-b text-center">
          <button
            [routerLink]="['/producers/edit', producer.id]"
            class="inline-flex items-center gap-2 text-brand-charcoal hover:text-brand-ink font-medium"
          >
            <ng-icon name="edit" class="h-4 w-4"></ng-icon>
            <span>Visualizar / Editar</span>
          </button>
        </td>
      </tr>

      <tr *ngIf="producers.length === 0">
        <td colspan="4" class="py-4 text-center text-brand-charcoal">
          Nenhum produtor encontrado.
        </td>
      </tr>
    </tbody>
  </table>
</div>
